services:
  app:
    build: .
    container_name: diary-app
    volumes:
      - ./content:/app/content
    env_file:
      - .env
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: diary-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
    restart: unless-stopped
